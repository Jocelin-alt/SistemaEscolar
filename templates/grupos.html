{% extends "base.html" %}

{% block content %}

<h1>Registro de Grupos</h1>

<form action="/guardar_grupo" method="POST">

    <label>ID Grupo:</label>
    <input type="text" name="grupo_id" required>
    <br><br>

    <label>Nombre del Grupo:</label>
    <input type="text" name="grupo" required>
    <br><br>

    <label>ID Maestro:</label>
    <input type="text" name="maestro_id" required>
    <br><br>

    <label>Nombre Maestro:</label>
    <input type="text" name="maestro_nombre" required>
    <br><br>

    <label>ID Materia:</label>
    <input type="text" name="materia_id" required>
    <br><br>

    <label>Nombre Materia:</label>
    <input type="text" name="materia_nombre" required>
    <br><br>

    <label>Especialidad:</label>
    <input type="text" name="especialidad" required>
    <br><br>

    <button type="submit">Guardar Grupo</button>
</form>

<br><br>

<a href="/reporte_grupos">
    <button type="button">Ver Grupos</button>
</a>

<br><br>

<a href="/">
    <button type="button">Regresar</button>
</a>

{% endblock %}
