<!DOCTYPE html>
<html>
<head>
    <title>Maestros</title>
</head>
<body>

    <h1>Registro de Maestros</h1>

    <h3>Buscar Maestro</h3>

    <form action="/buscar_maestro" method="POST">
        <label>Numero de Empleado:</label>
        <input type="text" name="numero_empleado">
        <button type="submit">Buscar</button>
    </form>

    <hr>

    <h3>Eliminar Maestro</h3>

    <form action="/eliminar_maestro" method="POST">
        <label>Numero de Empleado:</label>
        <input type="text" name="numero_empleado">
        <button type="submit">Eliminar</button>
    </form>

    <hr>

    <h3>Guardar Maestro</h3>

    <form action="/guardar_maestro" method="POST">

        <label>Numero de Empleado:</label>
        <input type="text" name="numero_empleado">

        <br><br>

        <label>Nombre:</label>
        <input type="text" name="nombre">

        <br><br>

        <label>Correo:</label>
        <input type="text" name="correo">

        <br><br>

        <label>Telefono:</label>
        <input type="text" name="telefono">

        <br><br>

        <label>Especialidad:</label>
        <input type="text" name="especialidad">

        <br><br>

        <button type="submit">Guardar</button>

    </form>

    <hr>

    <a href="/reporte_maestros">
        <button>Ver Reporte</button>
    </a>

    <br><br>

    <a href="/">
        <button>Regresar</button>
    </a>

</body>
</html>
