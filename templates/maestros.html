{% extends "base.html" %}

{% block content %}

<h1>Registro de Maestros</h1>

<h3>Buscar Maestro</h3>

<form action="/buscar_maestro" method="POST">
    <label>Numero de Empleado:</label>
    <input type="text" name="numero_empleado">
    <button type="submit">Buscar</button>
</form>

<hr>

<h3>Modificar Maestro</h3>

<form action="/modificar_maestro" method="POST">


<label>Numero de Empleado:</label>
<input type="text" name="numero_empleado">

<br><br>

<label>Nuevo Nombre:</label>
<input type="text" name="nombre">

<br><br>

<label>Correo:</label>
<input type="text" name="correo" placeholder="ejemplo">
<span>@gmail.com</span>

<br><br>

<label>Nuevo Telefono:</label>
<input type="text" name="telefono">

<br><br>

<label>Especialidad:</label>
<select name="especialidad">
    <option value="Programacion">Programacion</option>
    <option value="Electronica">Electronica</option>
    <option value="Bilingue">Bilingue</option>
    <option value="Recursos Humanos">Recursos Humanos</option>
</select>


<br><br>

<label>Nuevo Turno:</label>
<select name="turno">
    <option value="Matutino">Matutino</option>
    <option value="Vespertino">Vespertino</option>
</select>

<br><br>

<button type="submit">Modificar</button>


</form>

<hr>

<h3>Eliminar Maestro</h3>

<form action="/eliminar_maestro" method="POST">
    <label>Numero de Empleado:</label>
    <input type="text" name="numero_empleado">
    <button type="submit">Eliminar</button>
</form>

<hr>

<h3>Guardar Maestro</h3>

<form action="/guardar_maestro" method="POST">


<label>Numero de Empleado:</label>
<input type="text" name="numero_empleado">

<br><br>

<label>Nombre:</label>
<input type="text" name="nombre">

<br><br>

<label>Correo:</label>
<input type="text" name="correo" placeholder="ejemplo">
<span>@gmail.com</span>

<br><br>

<label>Telefono:</label>
<input type="text" name="telefono">

<br><br>

<label>Especialidad:</label>
<select name="especialidad">
    <option value="Programacion">Programacion</option>
    <option value="Electronica">Electronica</option>
    <option value="Bilingue">Bilingue</option>
    <option value="Recursos Humanos">Recursos Humanos</option>
</select>

<br><br>

<label>Turno:</label>
<select name="turno">
    <option value="Matutino">Matutino</option>
    <option value="Vespertino">Vespertino</option>
</select>

<br><br>

<button type="submit">Guardar</button>


</form>

<br>

<a href="/reporte_maestros">
    <button>Reporte de Maestros</button>
</a>

<br><br>

<a href="/">
    <button>Regresar</button>
</a>

{% endblock %}
